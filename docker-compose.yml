version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unilms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unilms"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: ./apps/backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/unilms?schema=public
      JWT_SECRET: change-me-super-secret-jwt-key-at-least-32-chars
      JWT_REFRESH_SECRET: change-me-super-secret-refresh-key-at-least-32
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api
    depends_on:
      - backend

volumes:
  pgdata:
